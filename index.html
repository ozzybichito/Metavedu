    <style>
      body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; background: #0a0f24; touch-action: none; }
      
      /* --- INTERFAZ COMERCIAL DE BIENVENIDA --- */
      #pantalla-inicio {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at center, #1a234a 0%, #080d22 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        overflow-y: auto; padding: 20px; box-sizing: border-box; color: white;
      }

      .titulo-inicio { font-size: 32px; font-weight: 800; background: linear-gradient(45deg, #00ffcc, #007bff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; text-align: center; }
      .subtitulo-inicio { color: #8fa0dd; margin-bottom: 25px; text-align: center; font-size: 14px; letter-spacing: 1px; }

      .selector-docentes {
        display: flex; gap: 15px; margin-bottom: 25px; width: 100%;
        max-width: 600px; justify-content: center; flex-wrap: wrap;
      }

      .tarjeta-docente {
        background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 16px; cursor: pointer;
        text-align: center; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 28%; min-width: 140px; flex-grow: 1; backdrop-filter: blur(4px);
        position: relative; overflow: hidden;
      }
      .tarjeta-docente:hover { background: rgba(255, 255, 255, 0.1); border-color: #00ffcc; }
      .tarjeta-docente.activa { border-color: #00ffcc; background: rgba(0, 255, 204, 0.15); transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
      .tarjeta-docente.bloqueada { opacity: 0.6; border: 2px dashed rgba(255,255,255,0.2); }
      
      .avatar-preview { font-size: 36px; margin-bottom: 6px; }
      .badge-premium { background: linear-gradient(45deg, #ff00ea, #00e5ff); color: black; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 5px; }
      .badge-mult { background: #00ffcc; color: black; font-size: 10px; font-weight: bold; padding: 1px 5px; border-radius: 4px; position: absolute; top: 8px; right: 8px; }

      .contenedor-botones-inicio { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }

      .btn-entrar {
        background: #444; color: #888; border: none; padding: 16px; width: 100%;
        font-size: 18px; border-radius: 50px; cursor: not-allowed; font-weight: bold;
        transition: all 0.3s; box-sizing: border-box; letter-spacing: 1px;
      }
      .btn-entrar.listo { background: linear-gradient(90deg, #00ffcc, #007bff); color: white; cursor: pointer; box-shadow: 0 5px 25px rgba(0, 255, 204, 0.4); }
      
      .btn-resetear { background: transparent; color: #6c7a9c; border: 1px solid #232d4b; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 11px; transition: color 0.2s; }
      .btn-resetear:hover { color: #ff3b30; }

      /* --- HUD GAMIFICADO --- */
      #hud-gamificado {
        position: absolute; top: 15px; right: 15px; z-index: 900; display: none;
        flex-direction: column; gap: 8px; font-family: 'Segoe UI', system-ui; width: 180px;
      }
      .hud-card {
        background: rgba(10, 16, 38, 0.85); color: white; border: 1px solid rgba(255,255,255,0.15);
        padding: 10px 14px; border-radius: 12px; font-weight: 700; font-size: 14px;
        backdrop-filter: blur(8px); display: flex; justify-content: space-between; align-items: center;
      }
      .hud-xp-container { font-size: 11px; color: #aaa; flex-direction: column; align-items: stretch; gap: 4px; }
      .barra-xp-bg { background: #222; height: 6px; border-radius: 3px; overflow: hidden; width: 100%; margin-top: 2px; }
      .barra-xp-fill { background: linear-gradient(90deg, #00ffcc, #007bff); width: 0%; height: 100%; transition: width 0.4s ease; }
      
      .racha-badge { background: linear-gradient(45deg, #ff9500, #ff5e00) !important; animation: pulse 1.5s infinite; }

      /* CONTROLADORES LATERALES */
      #joystick-zone { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 110px; height: 110px; z-index: 900; display: none; border-radius: 50%; background: rgba(255,255,255,0.1); }
      
      .btn-lateral {
        position: absolute; z-index: 900; display: none; color: white; border: 1px solid rgba(255,255,255,0.2);
        padding: 12px; border-radius: 12px; font-weight: bold; font-size: 14px; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.2s;
      }
      #btn-volver { top: 15px; left: 15px; background: rgba(255, 61, 0, 0.2); border-color: rgba(255, 61, 0, 0.4); }
      #btn-tienda-abrir { top: 75px; left: 15px; background: rgba(212, 175, 55, 0.2); border-color: rgba(212, 175, 55, 0.5); }
      #btn-rank-abrir { top: 135px; left: 15px; background: rgba(0, 123, 255, 0.2); border-color: rgba(0, 123, 255, 0.5); }

      /* --- MODALES UI GLASSMORPHISM --- */
      .panel-modal {
        position: absolute; top: 8%; left: 50%; transform: translateX(-50%);
        width: 92%; max-width: 460px; background: rgba(15, 23, 53, 0.96); border: 1px solid rgba(255,255,255,0.15);
        border-radius: 24px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        z-index: 1000; display: none; flex-direction: column; box-sizing: border-box; color: white; backdrop-filter: blur(15px);
      }
      
      .panel-titulo { font-weight: 800; font-size: 22px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; color: #00ffcc; display: flex; align-items: center; gap: 8px; }
      .panel-cuerpo { font-size: 15px; line-height: 1.6; white-space: pre-wrap; margin-bottom: 20px; color: #cbd5e1; }
      
      /* Quizzes */
      #contenedor-opciones { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
      .btn-opcion {
        background: rgba(255,255,255,0.04); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 14px;
        border-radius: 12px; font-size: 15px; cursor: pointer; transition: all 0.2s; text-align: left; font-weight: 500;
      }
      .btn-opcion:hover { background: rgba(255,255,255,0.1); border-color: #007bff; }
      .btn-opcion.correcta { background: rgba(40, 167, 69, 0.25); border-color: #28a745; color: #7cfc00; font-weight: bold; }
      .btn-opcion.incorrecta { background: rgba(220, 53, 69, 0.25); border-color: #dc3545; color: #ff9999; }
      #feedback-mensaje { font-weight: bold; text-align: center; min-height: 24px; margin-bottom: 15px; font-size: 14px; }

      /* Estilo Comercial Tienda */
      .lista-tienda { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; max-height: 220px; overflow-y: auto; padding-right: 4px; }
      .item-tienda {
        display: flex; justify-content: space-between; align-items: center;
        background: rgba(255,255,255,0.03); padding: 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05);
      }
      .item-info div { font-weight: bold; font-size: 15px; color: #fff; }
      .item-info span { font-size: 12px; color: #94a3b8; }
      .btn-tienda-accion { padding: 10px 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; transition: transform 0.2s; }
      .btn-tienda-accion:hover:not(:disabled) { transform: scale(1.05); }
      .btn-comprar { background: #d4af37; color: black; }
      .btn-equipar { background: #007AFF; color: white; }
      .btn-equipado { background: #2E8B57; color: white; cursor: default; }
      
      /* SECCIÓN MONETIZACIÓN TIKTOK REFORMADA */
      .monetizacion-tiktok-box { 
        border-top: 1px solid rgba(255,255,255,0.15); padding-top: 18px; 
        display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 14px;
      }
      .btn-tiktok-premium {
        background: linear-gradient(90deg, #ff0050, #00f2fe); color: white; border: none;
        padding: 10px 16px; border-radius: 10px; font-weight: bold; cursor: pointer; text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      }
      .btn-tiktok-premium:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

      /* Clasificación */
      .ranking-fila { display: flex; justify-content: space-between; padding: 10px 15px; border-radius: 10px; margin-bottom: 6px; background: rgba(255,255,255,0.02); align-items: center; font-size: 14px; }
      .ranking-fila.usuario-actual { background: linear-gradient(90deg, rgba(0,255,204,0.15), rgba(0,123,255,0.15)); border: 1px solid #00ffcc; font-weight: bold; }
      .rank-num { font-weight: 800; width: 30px; color: #00ffcc; }

      .acciones-footer { display: flex; gap: 10px; margin-top: 10px; }
      .btn-primario { background: linear-gradient(90deg, #007bff, #0056b3); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; }
      .btn-secundario { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; }

      @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    </style>

    <script>
      AFRAME.registerComponent('joystick-movement', {
        schema: { velocidad: { type: 'number', default: 0.12 } },
        init: function () {
          this.moviendo = false; this.dirX = 0; this.dirY = 0;
          this.camara = document.querySelector('#camara-vista');
        },
        activar: function() {
          const zone = document.getElementById('joystick-zone');
          zone.style.display = 'block';
          if(this.manager) this.manager.destroy();
          this.manager = nipplejs.create({ zone: zone, mode: 'static', position: { left: '50%', top: '50%' }, color: 'white', size: 90 });
          this.manager.on('start', () => { this.moviendo = true; });
          this.manager.on('end', () => { this.moviendo = false; this.dirX = 0; this.dirY = 0; });
          this.manager.on('move', (evt, data) => { this.dirX = data.vector.x; this.dirY = data.vector.y; });
        },
        desactivar: function() {
          this.moviendo = false; this.dirX = 0; this.dirY = 0;
          if(this.manager) this.manager.destroy();
        },
        tick: function (time, timeDelta) {
          if (!this.moviendo || !this.camara) return;
          let rotacionY = this.camara.getAttribute('rotation').y * (Math.PI / 180);
          let factorVelocidad = this.data.velocidad * (timeDelta / 16);
          let moveX = this.dirX * factorVelocidad; let moveZ = -this.dirY * factorVelocidad; 
          let cos = Math.cos(rotacionY); let sin = Math.sin(rotacionY);
          let rotatedX = moveX * cos + moveZ * sin; let rotatedZ = -moveX * sin + moveZ * cos;
          let posActual = this.el.getAttribute('position');
          let nuevoX = posActual.x + rotatedX; let nuevoZ = posActual.z + rotatedZ;

          if (nuevoX > -5.5 && nuevoX < 5.5 && nuevoZ > -6.5 && nuevoZ < 6.5) {
            this.el.setAttribute('position', { x: nuevoX, y: posActual.y, z: nuevoZ });
          }
        }
      });
    </script>
